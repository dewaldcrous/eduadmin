name: EduAdmin CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: eduadmin_test
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:7
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements/base.txt
          pip install pytest-django coverage factory-boy

      - name: Run tests with coverage
        env:
          SECRET_KEY: "test-secret-key-for-ci-pipeline"
          DEBUG: "True"
          DB_NAME: "eduadmin_test"
          DB_USER: "postgres"
          DB_PASSWORD: "postgres"
          DB_HOST: "localhost"
          REDIS_URL: "redis://localhost:6379/0"
        run: |
          pytest --cov=apps --cov-fail-under=70

      - name: Build Docker image
        run: docker build -t eduadmin:${{ github.sha }} .
